included:
  - App
  - Packages

excluded:
  - "**/.build"
  - "**/DerivedData"
  - App/Resources

disabled_rules:
  - todo
  - identifier_name        # physics/geometry code uses r, he, dx idiomatically
  - large_tuple            # (width, height) tuples are fine
  - trailing_comma

line_length:
  warning: 130
  error: 200
  ignores_comments: true

function_body_length:
  warning: 120
  error: 200

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000

cyclomatic_complexity:
  warning: 20
  error: 30

nesting:
  type_level: 3
