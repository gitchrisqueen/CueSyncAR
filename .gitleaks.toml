# Gitleaks configuration for CueSyncAR CI (M0-04 secrets scan).
#
# The allowlist below covers ONE known historical leak: a Roboflow API key
# hardcoded in the pre-modernization app source ("CueSync AR/BallDetect.swift",
# removed in 34f6ac8) and the vendored Pods tree from the same era. That key
# was ROTATED/REVOKED by the maintainer (2026-07-21); the history entries are
# inert. Nothing outside these legacy paths is allowlisted — a new leak in
# current code still fails CI.

[extend]
useDefault = true

[allowlist]
description = "Pre-M0 legacy paths whose leaked Roboflow key has been rotated"
paths = [
    '''CueSync AR/.*''',
    '''Pods/.*''',
]
