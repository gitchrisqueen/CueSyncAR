name: ci-app

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-app:
    name: Build iOS app (Simulator)
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain info
        run: |
          xcodebuild -version
          swift --version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        run: xcodegen generate
      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project CueSyncAR.xcodeproj \
            -scheme CueSyncAR \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

  test-packages-macos:
    name: Swift package tests (macOS)
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Test every package on the Apple toolchain
        run: |
          set -euo pipefail
          status=0
          for manifest in Packages/*/Package.swift; do
            pkg=$(dirname "$manifest")
            echo "::group::${pkg}"
            if ! swift test --package-path "$pkg"; then
              status=1
            fi
            echo "::endgroup::"
          done
          exit $status
