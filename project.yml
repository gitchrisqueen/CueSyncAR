# XcodeGen project definition — the Xcode project is generated, not committed.
# Run Scripts/bootstrap.sh (or `xcodegen generate`) and open CueSyncAR.xcodeproj.
# Rationale: generated projects eliminate .pbxproj merge conflicts, which is
# essential for parallel agents (docs/roadmap/01-TECH-MODERNIZATION.md).
name: CueSyncAR
options:
  bundleIdPrefix: CQC
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  xcodeVersion: "26.0"

packages:
  CueSyncCore:
    path: Packages/CueSyncCore
  BilliardsPhysics:
    path: Packages/BilliardsPhysics
  TableSpace:
    path: Packages/TableSpace
  PerceptionKit:
    path: Packages/PerceptionKit
  ARExperience:
    path: Packages/ARExperience
  DisplayKit:
    path: Packages/DisplayKit
  CueSyncUI:
    path: Packages/CueSyncUI
  CoachKit:
    path: Packages/CoachKit
  DetectionRoboflow:
    path: Packages/DetectionRoboflow
  CueSyncTestSupport:
    path: Packages/CueSyncTestSupport

targets:
  CueSyncAR:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - App/Sources
      - App/Resources/Assets.xcassets
    dependencies:
      - package: CueSyncCore
      - package: BilliardsPhysics
      - package: TableSpace
      - package: PerceptionKit
      - package: ARExperience
      - package: DisplayKit
      - package: CueSyncUI
      - package: CoachKit
      - package: DetectionRoboflow
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: CueSync AR
        UILaunchScreen: {}
        NSCameraUsageDescription: >-
          CueSync AR uses the camera to see the billiards table and balls so
          it can draw live shot guidance on top of them.
        UIRequiredDeviceCapabilities: [arkit]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Secrets surfaced from App/Config/Secrets.xcconfig (untracked).
        ROBOFLOW_API_KEY: $(ROBOFLOW_API_KEY)
        ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: CQC.CueSync-AR
        DEVELOPMENT_TEAM: 8VQNRK6J32
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: YES
    configFiles:
      Debug: App/Config/App.xcconfig
      Release: App/Config/App.xcconfig
    scheme:
      testTargets: []
      gatherCoverageData: true
